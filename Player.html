<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equalizers - Players</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: #f0f0f0; text-align: center; }
        header { background-color: #0033a0; color: #ffcc00; display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; border-bottom: 4px solid #ffcc00; }
        header img { height: 60px; }

        nav { background-color: #002b80; display: flex; padding: 0 40px; justify-content: center; }
        nav button { background: none; border: none; color: white; padding: 15px 30px; cursor: pointer; font-size: 18px; font-weight: bold; border-bottom: 4px solid transparent; }
        .active-btn { color: #ffcc00 !important; border-bottom: 4px solid #ffcc00 !important; }

        .player-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 40px; }
        .player-card { background: white; border-radius: 15px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-bottom: 5px solid #0033a0; }
        .player-card img { width: 100%; height: 300px; object-fit: cover; border-radius: 10px; }
    </style>
</head>
<body>
    <header>
        <img src="https://i.postimg.cc/bJRJCRn4/equalizers-logo-resized.png" alt="Logo">
        <h1>Equalizers</h1>
        <img src="https://i.postimg.cc/bJRJCRn4/equalizers-logo-resized.png" alt="Logo">
    </header>
    <nav>
        <button onclick="window.location.href='index.html'">Home</button>
        <button onclick="window.location.href='Player.html'" class="active-btn">Players</button>
        <button onclick="window.location.href='Draws.html'">Match Draws</button>
        <button onclick="window.location.href='Pictures.html'">Gallery</button>
    </nav>
    <h1>Player Profiles</h1>
    <div class="player-grid">
        <div class="player-card"><img src="https://i.postimg.cc/ryhh0jJW/2025061918082030.jpg"><h3>Agnes Urupua</h3></div>
        <div class="player-card"><img src="https://i.postimg.cc/RhKq2pSC/2025061423014210.jpg"><h3>Tiriman Masi</h3></div>
    </div>
</body>
</html>
