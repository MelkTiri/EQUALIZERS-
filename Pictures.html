<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equalizers - Gallery</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: #f0f0f0; text-align: center; }
        header { background-color: #0033a0; color: #ffcc00; display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; border-bottom: 4px solid #ffcc00; }
        header img { height: 60px; }

        /* The Tab Menu Styles */
        nav { background-color: #002b80; display: flex; padding: 0 40px; justify-content: center; }
        nav button { background: none; border: none; color: white; padding: 15px 30px; cursor: pointer; font-size: 18px; font-weight: bold; border-bottom: 4px solid transparent; transition: 0.3s; }
        nav button:hover { color: #ffcc00; }
        .active-btn { color: #ffcc00 !important; border-bottom: 4px solid #ffcc00 !important; }

        .gallery-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 20px; }
        .gallery-item img { width: 100%; height: 300px; object-fit: cover; border-radius: 8px; }
    </style>
</head>
<body>
    <header>
        <img src="https://i.postimg.cc/bJRJCRn4/equalizers-logo-resized.png" alt="Logo">
        <h1>Equalizers</h1>
        <img src="https://i.postimg.cc/bJRJCRn4/equalizers-logo-resized.png" alt="Logo">
    </header>

    <nav>
        <button onclick="window.location.href='index.html'">Home</button>
        <button onclick="window.location.href='Player.html'">Players</button>
        <button onclick="window.location.href='Draws.html'">Match Draws</button>
        <button onclick="window.location.href='Pictures.html'" class="active-btn">Gallery</button>
    </nav>
<div class="upload-box">
    <h2 style="color: #0033a0; margin-top: 0;">Player & Team Uploads</h2>
    <p>Got a great shot from the game? Share your Equalizers moments below!</p>
    <label for="moment-upload" class="upload-label">Choose Photos</label>
    <input type="file" id="moment-upload" accept="image/*" multiple>
    <div id="preview-grid"></div>
</div>

<h1 class="section-title">Club Photo Gallery</h1>
<div class="gallery-container">
    <div class="gallery-item">
        <img src="https://i.postimg.cc/SK5xWFvr/Equalizers-Mens-Team.jpg.jpeg" alt="Mens Team">
        <p>The Men's Side</p>
    </div>
    <div class="gallery-item">
        <img src="https://i.postimg.cc/cCG1b7Zt/Equalizers-Womens-Team.jpg.jpeg" alt="Womens Team">
        <p>The Women's Side</p>
    </div>
</div>

<h2 class="section-title">Moments from the Court</h2>
<div class="gallery-container">
    <div class="gallery-item"><img src="https://i.postimg.cc/j5t79qDx/Whats-App-Image-2025-05-20-at-9-47-53-AM.jpg"></div>
    <div class="gallery-item"><img src="https://i.postimg.cc/9Mb7j39G/Whats-App-Image-2025-05-20-at-9-47-54-AM.jpg"></div>
    <div class="gallery-item"><img src="https://i.postimg.cc/J0dHGbP0/Whats-App-Image-2025-05-20-at-9-47-55-AM.jpg"></div>
    <div class="gallery-item"><img src="https://i.postimg.cc/3rLvSTYh/Whats-App-Image-2025-05-20-at-9-47-56-AM.jpg"></div>
    <div class="gallery-item"><img src="https://i.postimg.cc/RZtJZJfC/Whats-App-Image-2025-05-20-at-9-47-58-AM.jpg"></div>
    <div class="gallery-item"><img src="https://i.postimg.cc/5tMYY9qB/Whats-App-Image-2025-05-20-at-9-47-59-AM.jpg"></div>
    <div class="gallery-item"><img src="https://i.postimg.cc/FRT7Bytp/Whats-App-Image-2025-05-20-at-9-48-01-AM.jpg"></div>
    <div class="gallery-item"><img src="https://i.postimg.cc/tJf7X94V/Whats-App-Image-2025-05-20-at-9-48-02-AM.jpg"></div>
    <div class="gallery-item"><img src="https://i.postimg.cc/1RY80rr5/Whats-App-Image-2025-05-20-at-9-48-04-AM.jpg"></div>
</div>

<footer style="padding: 40px; color: #666;">
    &copy; 2026 Equalizers Basketball Club
</footer>

<script>
    const uploader = document.getElementById('moment-upload');
    const previewGrid = document.getElementById('preview-grid');

    uploader.addEventListener('change', function() {
        const files = Array.from(this.files);
        
        files.forEach(file => {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = document.createElement('img');
                img.src = e.target.result;
                img.classList.add('preview-img');
                previewGrid.appendChild(img);
            }
            reader.readAsDataURL(file);
        });
        
        if(files.length > 0) {
            alert("Nice! Your moments have been added to the session preview.");
        }
    });
</script>

</body>
</html>
