<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equalizers - Match Draws</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: #f0f0f0; text-align: center; }
        header { background-color: #0033a0; color: #ffcc00; display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; border-bottom: 4px solid #ffcc00; }
        header img { height: 60px; }

        /* The Tab Menu Styles */
        nav { background-color: #002b80; display: flex; padding: 0 40px; justify-content: center; }
        nav button { background: none; border: none; color: white; padding: 15px 30px; cursor: pointer; font-size: 18px; font-weight: bold; border-bottom: 4px solid transparent; transition: 0.3s; }
        nav button:hover { color: #ffcc00; }
        .active-btn { color: #ffcc00 !important; border-bottom: 4px solid #ffcc00 !important; }

        .draw-container { background: white; margin: 20px auto; padding: 20px; width: 90%; max-width: 800px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        #matchDrawImg { max-width: 100%; border-radius: 5px; }
    </style>
</head>
<body>
    <header>
        <img src="https://i.postimg.cc/bJRJCRn4/equalizers-logo-resized.png" alt="Logo">
        <h1>Equalizers</h1>
        <img src="https://i.postimg.cc/bJRJCRn4/equalizers-logo-resized.png" alt="Logo">
    </header>

    <nav>
        <button onclick="window.location.href='index.html'">Home</button>
        <button onclick="window.location.href='Player.html'">Players</button>
        <button onclick="window.location.href='Draws.html'" class="active-btn">Match Draws</button>
        <button onclick="window.location.href='Pictures.html'">Gallery</button>
    </nav>

    <div class="draw-container">
        <h1>Official Match Draws</h1>
        <img id="matchDrawImg" src="https://i.postimg.cc/HLwrRSxh/IMG-20250428-WA0006.jpg" alt="Match Draw">
    </div>
</body>
</html>
